default_route: main

# 全局中转清洗目录（所有路由共用）
# 配置了则磁力链接先下载到这里，完成后自动清洗并转存到目标目录
# 留空或删除则磁力链接直接提交到目标目录，ed2k 始终直接提交
staging_folder: /115open/staging

routes:
  # ----------------------------------------------------------
  # main：默认离线路由
  # ----------------------------------------------------------
  main:
    path: /115open/磁力
    organize_by_date: true
    allow_subdir: true
    comment: 默认离线目录

  sub:
    path: /115open/手动转存
    organize_by_date: true
    allow_subdir: true
    comment: 手动转存目录

  temp:
    path: /115open/临时
    organize_by_date: false
    allow_subdir: false
    comment: 临时目录，不允许自定义子目录
